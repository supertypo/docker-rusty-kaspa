name: Docker

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: kaspad
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          target: kaspad
          build-args: |
            GIT_REPO_URL=https://github.com/kaspanet/rusty-kaspa.git
            GIT_REF_NAME=${GITHUB_REF_NAME}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-kaspad:${GITHUB_REF_NAME}
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-kaspad:latest
          platforms: linux/amd64,linux/arm64

      - name: simpa
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          target: simpa
          build-args: |
            GIT_REPO_URL=https://github.com/kaspanet/rusty-kaspa.git
            GIT_REF_NAME=${GITHUB_REF_NAME}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-simpa:${GITHUB_REF_NAME}
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-simpa:latest
          platforms: linux/amd64,linux/arm64

      - name: rothschild
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          target: rothschild
          build-args: |
            GIT_REPO_URL=https://github.com/kaspanet/rusty-kaspa.git
            GIT_REF_NAME=${GITHUB_REF_NAME}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-rothschild:${GITHUB_REF_NAME}
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-rothschild:latest
          platforms: linux/amd64,linux/arm64
