name: Docker images

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            variant: amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            variant: arm64
            runs-on: self-hosted-ARM64
    steps:
      - uses: actions/checkout@v2
      - uses: docker/setup-buildx-action@v1
      - uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: kaspad
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          target: kaspad
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_REPO_URL=https://github.com/kaspanet/rusty-kaspa.git
            GIT_REF_NAME=${{ github.ref_name }}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-kaspad:${{ github.ref_name }}-${{ matrix.variant }}
            ${{ secrets.DOCKER_HUB_NAMESPACE }}/rusty-kaspad:latest-${{ matrix.variant }}

  create-and-push-multiarch-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - run: |
          for component in kaspad; do
              docker buildx imagetools create -t ${{ secrets.DOCKER_HUB_NAMESPACE }}/$component:latest \
                ${{ secrets.DOCKER_HUB_NAMESPACE }}/$component:latest-amd64 \
                ${{ secrets.DOCKER_HUB_NAMESPACE }}/$component:latest-arm64 \
                --push
          done
